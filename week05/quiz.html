<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>

    <h1>HTML & CSS Knowledge Quiz</h1>

    <form>
        <div class="form-item">
            <label for="q1">1. What HTML tag is used to create a hyperlink?</label>
            <input type="text" id="q1" name="q1">
        </div>

        <div class="form-item">
            <label for="q2">2. Briefly explain the purpose of CSS.</label>
            <textarea id="q2" name="q2" rows="4"></textarea>
        </div>

        <div class="form-item">
            <label for="q3">3. Which CSS property is used to change text color?</label>
            <select id="q3" name="q3">
                <option value="" selected disabled>Choose One ...</option>
                <option value="font-color">font-color</option>
                <option value="text-color">text-color</option>
                <option value="color">color</option>
            </select>
        </div>

        <div class="form-item">
            <label for="q4">4. How many heading levels does HTML provide?</label>
            <input type="number" id="q4" name="q4" min="1" max="10">
        </div>

        <button type="submit">Submit Quiz</button>
    </form>
    </main>

    <footer>
        <p>&copy; 2026 | HTML Quiz Activity | Hossana Okon Edem </p>
    </footer>
</body>

</html>
